name: CI/CD

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  BINARY_NAME: qwen-stt-compatible
  GO_VERSION: "1.22"
  REGISTRY: ghcr.io

jobs:
  test:
    name: Go checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

  build-linux:
    name: Build Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            goarch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config curl xz-utils tar

      - name: Build static audio dependencies
        run: ./scripts/bootstrap-static-audio-deps.sh
        env:
          JOBS: 2

      - name: Verify FFmpeg filters
        run: grep -q '#define CONFIG_ASPLIT_FILTER 1' third_party/src/ffmpeg-*/config_components.h

      - name: Build binary
        run: |
          mkdir -p dist
          CGO_ENABLED=1 \
          GOOS=linux \
          GOARCH="${{ matrix.goarch }}" \
          PKG_CONFIG_PATH="$PWD/third_party/ffmpeg-audio/lib/pkgconfig" \
          PKG_CONFIG="pkg-config --static" \
          go build -tags libav -trimpath -ldflags="-s -w -linkmode external -extldflags '-static'" -o "dist/${BINARY_NAME}" ./cmd/server

      - name: Package binary
        run: |
          artifact="${BINARY_NAME}-linux-${{ matrix.arch }}.tar.gz"
          cp README.md LICENSE dist/
          tar -C dist -czf "$artifact" "$BINARY_NAME" README.md LICENSE
          sha256sum "$artifact" > "$artifact.sha256"
          mkdir -p upload
          mv "$artifact" "$artifact.sha256" upload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-linux-${{ matrix.arch }}
          path: upload/*
          if-no-files-found: error

  build-windows:
    name: Build Windows ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            runner: windows-2022
            msystem: UCRT64
            msys-package-prefix: mingw-w64-ucrt-x86_64
            cc: /ucrt64/bin/gcc
            pkg_config: /ucrt64/bin/pkg-config
            opus_configure_flags: ""
            ffmpeg_configure_flags: --arch=x86_64 --target-os=mingw32
          - arch: arm64
            goarch: arm64
            runner: windows-11-arm
            msystem: CLANGARM64
            msys-package-prefix: mingw-w64-clang-aarch64
            cc: /clangarm64/bin/clang
            pkg_config: /clangarm64/bin/pkg-config
            opus_configure_flags: --disable-rtcd --disable-asm
            ffmpeg_configure_flags: --arch=aarch64 --target-os=mingw32
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          path-type: inherit
          update: true
          install: >-
            base-devel
            autoconf
            automake
            libtool
            make
            curl
            tar
            xz
            zip
            ${{ matrix.msys-package-prefix }}-pkgconf
            ${{ matrix.msys-package-prefix }}-toolchain

      - name: Build static audio dependencies
        run: ./scripts/bootstrap-static-audio-deps.sh
        env:
          CC: ${{ matrix.cc }}
          PKG_CONFIG_BIN: ${{ matrix.pkg_config }}
          OPUS_CONFIGURE_FLAGS: ${{ matrix.opus_configure_flags }}
          FFMPEG_CONFIGURE_FLAGS: ${{ matrix.ffmpeg_configure_flags }}
          JOBS: 2

      - name: Verify FFmpeg filters
        run: grep -q '#define CONFIG_ASPLIT_FILTER 1' third_party/src/ffmpeg-*/config_components.h

      - name: Normalize Windows ARM64 pkg-config flags
        if: matrix.arch == 'arm64'
        run: sed -i 's/ -latomic//g' third_party/ffmpeg-audio/lib/pkgconfig/*.pc

      - name: Build binary
        run: |
          mkdir -p dist
          CGO_ENABLED=1 \
          GOOS=windows \
          GOARCH="${{ matrix.goarch }}" \
          CC="${{ matrix.cc }}" \
          PKG_CONFIG_PATH="$PWD/third_party/ffmpeg-audio/lib/pkgconfig" \
          PKG_CONFIG="${{ matrix.pkg_config }} --static" \
          go build -tags libav -trimpath -ldflags="-s -w -linkmode external -extldflags '-static'" -o "dist/${BINARY_NAME}.exe" ./cmd/server

      - name: Package binary
        run: |
          artifact="${BINARY_NAME}-windows-${{ matrix.arch }}.zip"
          cp README.md LICENSE dist/
          (cd dist && zip -9 "../$artifact" "$BINARY_NAME.exe" README.md LICENSE)
          sha256sum "$artifact" > "$artifact.sha256"
          mkdir -p upload
          mv "$artifact" "$artifact.sha256" upload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-windows-${{ matrix.arch }}
          path: upload/*
          if-no-files-found: error

  release-latest:
    name: Latest release
    runs-on: ubuntu-24.04
    needs:
      - build-linux
      - build-windows
    if: github.event_name != 'pull_request' && (github.ref_name == github.event.repository.default_branch || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create checksum manifest
        working-directory: release-assets
        run: sha256sum *.tar.gz *.zip > SHA256SUMS

      - name: Move Latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f Latest "$GITHUB_SHA"
          git push --force origin refs/tags/Latest

      - name: Publish rolling Latest release
        uses: ncipollo/release-action@v1
        with:
          tag: Latest
          name: Latest
          commit: ${{ github.sha }}
          body: Rolling release generated from `${{ github.sha }}`.
          artifacts: release-assets/*
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          makeLatest: true

  docker:
    name: Docker image
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == github.event.repository.default_branch || github.event_name == 'workflow_dispatch' }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
